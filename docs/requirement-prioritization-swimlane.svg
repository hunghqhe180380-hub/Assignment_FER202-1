<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
    <style>
      .title { font: bold 18px Arial, sans-serif; fill: #1a1a1a; }
      .subtitle { font: 12px Arial, sans-serif; fill: #555; }
      .lane-title { font: bold 13px Arial, sans-serif; fill: #1a1a1a; }
      .activity { font: 11px Arial, sans-serif; fill: #1a1a1a; }
      .small { font: 10px Arial, sans-serif; fill: #555; }
      .decision { font: 10px Arial, sans-serif; fill: #1a1a1a; }
      .label-yes { font: bold 10px Arial, sans-serif; fill: #2E7D32; }
      .label-no { font: bold 10px Arial, sans-serif; fill: #C62828; }
    </style>
  </defs>

  <!-- Title -->
  <text x="700" y="32" text-anchor="middle" class="title">Requirement Prioritization Process  Swimlane Diagram</text>
  <text x="700" y="52" text-anchor="middle" class="subtitle">Visual Paradigm | 4 Swimlanes</text>

  <!-- Lane backgrounds -->
  <rect x="180" y="70" width="1180" height="130" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <rect x="180" y="200" width="1180" height="130" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <rect x="180" y="330" width="1180" height="130" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
  <rect x="180" y="460" width="1180" height="130" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <rect x="180" y="590" width="1180" height="100" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>

  <!-- Lane labels -->
  <rect x="10" y="70" width="160" height="130" fill="#BBDEFB" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="125" text-anchor="middle" class="lane-title">Customer</text>
  <text x="90" y="143" text-anchor="middle" class="lane-title">Representatives</text>

  <rect x="10" y="200" width="160" height="130" fill="#C8E6C9" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="260" text-anchor="middle" class="lane-title">Business</text>
  <text x="90" y="278" text-anchor="middle" class="lane-title">Analyst</text>

  <rect x="10" y="330" width="160" height="130" fill="#FFE0B2" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="390" text-anchor="middle" class="lane-title">Developers</text>

  <rect x="10" y="460" width="160" height="130" fill="#E1BEE7" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="515" text-anchor="middle" class="lane-title">Project</text>
  <text x="90" y="533" text-anchor="middle" class="lane-title">Manager</text>

  <rect x="10" y="590" width="160" height="100" fill="#BBDEFB" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="635" text-anchor="middle" class="lane-title">Customer</text>
  <text x="90" y="653" text-anchor="middle" class="lane-title">Representatives</text>

  <!-- Start -->
  <circle cx="210" cy="135" r="16" fill="#333"/>
  <text x="210" y="140" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial">�</text>

  <!-- Customer Rep: Identify Requirements -->
  <rect x="250" y="110" width="130" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="315" y="132" text-anchor="middle" class="activity">Identify</text>
  <text x="315" y="148" text-anchor="middle" class="activity">Requirements</text>

  <!-- Estimate Benefit -->
  <rect x="410" y="110" width="130" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="475" y="128" text-anchor="middle" class="activity">Estimate Benefit</text>
  <text x="475" y="144" text-anchor="middle" class="small">(19)</text>

  <!-- Estimate Penalty -->
  <rect x="570" y="110" width="130" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="635" y="128" text-anchor="middle" class="activity">Estimate Penalty</text>
  <text x="635" y="144" text-anchor="middle" class="small">(19)</text>

  <!-- BA: Create Requirement List -->
  <rect x="730" y="240" width="140" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="800" y="258" text-anchor="middle" class="activity">Create Requirement</text>
  <text x="800" y="274" text-anchor="middle" class="activity">List</text>

  <!-- Calculate Total Value -->
  <rect x="900" y="240" width="140" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="970" y="258" text-anchor="middle" class="activity">Calculate Total</text>
  <text x="970" y="274" text-anchor="middle" class="activity">Value</text>

  <!-- Developers: Estimate Cost -->
  <rect x="730" y="370" width="130" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="795" y="388" text-anchor="middle" class="activity">Estimate Cost</text>
  <text x="795" y="404" text-anchor="middle" class="small">(19)</text>

  <!-- Estimate Technical Risk -->
  <rect x="890" y="370" width="150" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="965" y="388" text-anchor="middle" class="activity">Estimate Technical</text>
  <text x="965" y="404" text-anchor="middle" class="activity">Risk (19)</text>

  <!-- BA: Calculate Priority Score -->
  <rect x="1070" y="240" width="150" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="1145" y="258" text-anchor="middle" class="activity">Calculate Priority</text>
  <text x="1145" y="274" text-anchor="middle" class="activity">Score</text>

  <!-- PM: Review Priority Ranking -->
  <rect x="1070" y="500" width="150" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="1145" y="518" text-anchor="middle" class="activity">Review Priority</text>
  <text x="1145" y="534" text-anchor="middle" class="activity">Ranking</text>

  <!-- Decision: Approved? -->
  <polygon points="1270,525 1310,545 1270,565 1230,545" fill="#FFF8E1" stroke="#333" stroke-width="1.5"/>
  <text x="1270" y="549" text-anchor="middle" class="decision">Approved?</text>

  <!-- Approve Prioritized Requirements -->
  <rect x="1240" y="610" width="150" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="1315" y="628" text-anchor="middle" class="activity">Approve Prioritized</text>
  <text x="1315" y="644" text-anchor="middle" class="activity">Requirements</text>

  <!-- Receive Final Priority List -->
  <rect x="1050" y="615" width="150" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="1125" y="633" text-anchor="middle" class="activity">Receive Final</text>
  <text x="1125" y="649" text-anchor="middle" class="activity">Priority List</text>

  <!-- End -->
  <circle cx="920" cy="640" r="16" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="920" cy="640" r="10" fill="#333"/>

  <!-- Request Reassessment -->
  <rect x="890" y="500" width="140" height="50" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="960" y="518" text-anchor="middle" class="activity">Request</text>
  <text x="960" y="534" text-anchor="middle" class="activity">Reassessment</text>

  <!-- Arrows: main flow -->
  <line x1="226" y1="135" x2="248" y2="135" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="135" x2="408" y2="135" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="135" x2="568" y2="135" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="135" x2="800" y2="135" stroke="#333" stroke-width="1.5"/>
  <line x1="800" y1="135" x2="800" y2="238" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="870" y1="265" x2="898" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1040" y1="265" x2="1068" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1145" y1="290" x2="1145" y2="368" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1040" y1="395" x2="1068" y2="395" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1145" y1="395" x2="1145" y2="290" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1145" y1="290" x2="1145" y2="498" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1220" y1="525" x2="1228" y2="525" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Yes path -->
  <line x1="1270" y1="565" x2="1270" y2="590" stroke="#333" stroke-width="1.5"/>
  <line x1="1270" y1="590" x2="1315" y2="608" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1285" y="582" class="label-yes">Yes</text>
  <line x1="1240" y1="635" x2="1202" y2="635" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1050" y1="640" x2="938" y2="640" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- No path - reassessment loop -->
  <line x1="1230" y1="545" x2="1030" y2="545" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="1120" y="538" class="label-no">No</text>
  <line x1="960" y1="500" x2="960" y2="422" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="975" y="460" class="label-no" transform="rotate(-90 975 460)">Return to Cost/Risk</text>

  <!-- Legend -->
  <rect x="20" y="700" width="1360" height="1" fill="#ccc"/>
  <text x="30" y="712" class="small">Legend: Main flow (black) | Reassessment loop (red) | Scale: Benefit, Penalty, Cost, Technical Risk = 19</text>
</svg>
